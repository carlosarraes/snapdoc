name = "snapdoc"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Artifact host (landing + serving) and API host (JSON API + dashboard)
routes = [
  { pattern = "snapdoc.carraes.dev", custom_domain = true },
  { pattern = "api.snapdoc.carraes.dev", custom_domain = true },
]

[assets]
directory = "public"
binding = "ASSETS"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "snapdoc"
database_id = "cba32e0b-1ac5-423d-80a6-f55beb77f943"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "snapdoc-artifacts"

[triggers]
crons = ["0 * * * *"]

[vars]
ARTIFACT_HOST = "snapdoc.carraes.dev"
API_HOST = "api.snapdoc.carraes.dev"
MAX_ARTIFACT_BYTES = "2097152"
DEFAULT_TTL = "14d"
MAX_TTL = "90d"
MIN_TTL = "1h"
RATE_LIMIT_PER_HOUR = "100"

# Secrets (set via `wrangler secret put`):
# ADMIN_BOOTSTRAP — mints the first API token
# CF_ACCESS_AUD / CF_ACCESS_TEAM_DOMAIN — Access JWT verification (BOTH are
#   required in production; the admin API fails closed with 503 "misconfigured"
#   when either is missing)
#
# Local development: create a .dev.vars file (gitignored) containing
#   ENVIRONMENT="dev"
#   ADMIN_BOOTSTRAP="dev-bootstrap-secret"
# ENVIRONMENT="dev"/"test" enables the admin-auth stub when
# CF_ACCESS_TEAM_DOMAIN is unset. Never set ENVIRONMENT in production.

# Keep the dev-server URL on localhost so the worker's path-based routing
# fallback (instead of host-based routing) applies during `wrangler dev`.
[dev]
host = "localhost"
